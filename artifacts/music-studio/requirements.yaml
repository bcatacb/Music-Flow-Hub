packages:
  "framer-motion": "For sleek, studio-grade page transitions and micro-interactions"
  "recharts": "For the analytics dashboard and streaming data visualization"
  "date-fns": "For formatting release dates and creation timestamps"
  "react-hook-form": "For robust entity creation forms"
  "@hookform/resolvers": "For Zod schema validation in forms"

images:
