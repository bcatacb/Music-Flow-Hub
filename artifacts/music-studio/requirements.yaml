  - path: "artifacts/music-studio/public/images/album-placeholder.png"
    description: "Minimalist, sleek, dark abstract geometric art suitable for a modern electronic music album cover"
    aspect_ratio: "1:1"

notes:
  - "App assumes dark mode by default for a professional studio aesthetic."
  - "All API hooks imported from @workspace/api-client-react as per monorepo structure."
